name: CI Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint and typecheck
        run: npm run check
