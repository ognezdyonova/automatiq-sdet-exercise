name: Run k6 Geocode Test

on:
  workflow_dispatch:
    inputs:
      city:
        description: "City to geocode (example: Los Angeles)"
        required: true
        default: "Los Angeles"
        type: string
      google_api_key:
        description: "Google Geocode API auth token"
        required: true
        type: string

jobs:
  k6-geocode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run geocode test
        env:
          CITY: ${{ github.event.inputs.city }}
          GOOGLE_API_KEY: ${{ github.event.inputs.google_api_key }}
        run: |
          k6 run tests/sdet_geocode_api_test.ts
